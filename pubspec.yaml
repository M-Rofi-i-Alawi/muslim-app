name: muslim_app
description: A Muslim App
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_generative_ai: any
  flutter_dotenv: ^5.1.0
  vibration: ^1.8.4

  
  # flutter compass
  flutter_compass: ^0.8.0
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.2.0
  
  # Location & Qibla
  geolocator: ^11.0.0
  permission_handler: ^11.2.0
  
  # Utilities
  intl: ^0.19.0
  google_fonts: ^6.3.0
  shared_preferences: ^2.2.2

  # Database lokal untuk data Ramadhan
  sqflite: ^2.3.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1


flutter:
  uses-material-design: true

  assets:
    - assets/doa.json
    - assets/hadist_arbain.json
    - assets/asmaul_husna.json
    - assets/dzikir_pagi.json
    - assets/dzikir_petang.json
    - assets/dzikir_shalat.json
    - assets/panduan/shalat.json
    - assets/panduan/wudhu.json
    - assets/panduan/puasa.json
    - assets/panduan/zakat.json
    - assets/panduan/haji.json